<aside class="sidebar">
  <div class="sidebar-inner">
    <a href="{{ .Site.BaseURL }}" class="sidebar-brand">
      <div class="sidebar-avatar">
        <img src="/img/assets/mix-viper.png" alt="{{ .Site.Title }}" />
      </div>
      <span class="sidebar-title">{{ .Site.Title }}</span>
      <span class="sidebar-subtitle"><b style="color: #ffffff;">Penetration Tester</b></span>
    </a>

    <nav class="sidebar-nav">
      {{ range $i, $item := .Site.Menus.main }}
        <a href="{{ .URL }}" class="sidebar-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">
          <span class="sidebar-link-num">{{ printf "%02d" (add $i 1) }}</span>
          <span class="sidebar-link-text">{{ .Name }}</span>
        </a>
      {{ end }}
    </nav>

    </div>

</aside>

<script>
(function() {
  var toggle = document.getElementById('sidebarToggle');
  var sidebar = document.querySelector('.sidebar');
  if (toggle && sidebar) {
    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      toggle.classList.toggle('active');
    });
    document.querySelector('.site-main').addEventListener('click', function() {
      sidebar.classList.remove('open');
      toggle.classList.remove('active');
    });
  }
})();
</script>
